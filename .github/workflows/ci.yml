name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test

  test-python:
    name: Python tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python/uv.lock

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Test
        run: uv run python -m pytest
