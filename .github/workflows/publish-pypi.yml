name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"       # e.g. v0.4.0
      - "py-v[0-9]+.[0-9]+.[0-9]+"    # e.g. py-v0.4.0 (Python-only release)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip PyPI upload)"
        type: boolean
        default: false

jobs:
  publish-pypi:
    name: Build & Publish Python SDK → PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for PyPI trusted publishing (OIDC)

    defaults:
      run:
        working-directory: packages/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python/uv.lock

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest
        continue-on-error: true

      - name: Build distributions
        run: uv build

      - name: Verify package version
        run: |
          PKG_VERSION=$(uv run python -c "import importlib.metadata; print(importlib.metadata.version('kweaver-sdk'))" 2>/dev/null || \
            python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "Publishing kweaver-sdk==${PKG_VERSION} to PyPI"

      # Option A: Trusted Publishing (OIDC) — no secrets needed.
      # Configure at https://pypi.org/manage/project/kweaver-sdk/settings/publishing/
      # Add a trusted publisher for: owner=kweaver-ai, repo=kweaver-sdk,
      # workflow=publish-pypi.yml, environment=pypi
      - name: Publish to PyPI (trusted publishing)
        if: ${{ !inputs.dry_run && vars.PYPI_PUBLISH_METHOD != 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
          skip-existing: true

      # Option B: API token — set PYPI_API_TOKEN in repo secrets and
      # set the Actions variable PYPI_PUBLISH_METHOD=token to use this path.
      - name: Publish to PyPI (API token)
        if: ${{ !inputs.dry_run && vars.PYPI_PUBLISH_METHOD == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
